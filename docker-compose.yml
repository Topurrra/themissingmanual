services:
  api:
    build:
      context: .
      dockerfile: platform/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BIND_ADDR: 0.0.0.0:3000
      CONTENT_ROOT: .
      DB_PATH: /data/manual.db
      # Enable the admin console by setting a password hash. Generate one with:
      #   docker compose run --rm api server hash-password "your-password"
      # then export ADMIN_PASSWORD_HASH (e.g. in a .env file beside this compose file).
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    volumes:
      - manual-data:/data
      # Live content: drop guide folders in ./guides and the periodic sync picks them up
      # (files win on change). Read-only — the server only reads them.
      - ./guides:/app/guides:ro

  web:
    build:
      context: platform/web
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      API_BASE: http://api:3000
      PORT: "3000"
      # adapter-node's public origin, used by SvelteKit's CSRF check on form POSTs.
      # Must match the URL in the browser, or logins/forms get 403. Override for
      # production, e.g. ORIGIN=https://your-domain.
      ORIGIN: ${ORIGIN:-http://localhost:5173}
    depends_on:
      - api

volumes:
  manual-data:
