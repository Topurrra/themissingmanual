services:
  api:
    build:
      context: .
      dockerfile: platform/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BIND_ADDR: 0.0.0.0:3000
      CONTENT_ROOT: .

  web:
    build:
      context: platform/web
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      API_BASE: http://api:3000
      PORT: "3000"
    depends_on:
      - api
