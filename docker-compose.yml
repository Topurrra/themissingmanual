services:
  api:
    build:
      context: .
      dockerfile: platform/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BIND_ADDR: 0.0.0.0:3000
      CONTENT_ROOT: .
      DB_PATH: /data/manual.db
      # Enable the admin console by setting a password hash. Generate one with:
      #   docker compose run --rm api server hash-password "your-password"
      # then export ADMIN_PASSWORD_HASH (e.g. in a .env file beside this compose file).
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
    volumes:
      - manual-data:/data

  web:
    build:
      context: platform/web
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    environment:
      API_BASE: http://api:3000
      PORT: "3000"
    depends_on:
      - api

volumes:
  manual-data:
