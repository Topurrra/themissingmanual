<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Primary &amp; Foreign Keys — Databases, Explained</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { margin: 0; }
    .git-nav-btn:disabled { opacity: 0.35; cursor: default; }
    [data-theme="missingmanual"] .git-nav-btn,
    [data-theme="missingmanual"] .mm-box {
      border-width: 1px !important;
      border-color: oklch(0.9 0.003 260) !important;
      box-shadow: none !important;
      transition: none !important;
    }
    [data-theme="missingmanual"] .mm-brand {
      visibility: visible !important;
    }
  </style>
</helmet>

<div data-screen-label="{{ stepLabel }}" data-theme="{{ activeThemeKey }}" style="min-height:100vh;{{ themeVars }}background:var(--bg);background-image:radial-gradient(var(--dot) 1.4px, transparent 1.4px);background-size:26px 26px;font-family:var(--font-heading);color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:28px 24px 40px;box-sizing:border-box;">

  <div style="max-width:1080px;width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="Databases.dc.html" style="text-decoration:none;color:var(--ink);font-family:var(--font-mono);font-size:14px;display:flex;align-items:center;gap:6px;">&larr; all concepts</a>
      <span class="mm-brand" style="display:inline-flex;visibility:hidden;align-items:center;gap:6px;font-family:var(--font-mono);font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--muted);">The Missing Manual</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span style="font-family:var(--font-mono);font-size:13px;color:var(--muted);">04</span>
      <h1 style="font-size:20px;margin:0;font-weight:600;">Primary &amp; Foreign Keys</h1>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="display:flex;align-items:center;gap:7px;">
        <sc-for list="{{ swatches }}" as="sw" hint-placeholder-count="4">
          <div onClick="{{ sw.onClick }}" title="{{ sw.label }}" style="{{ sw.style }}"></div>
        </sc-for>
      </div>
      <span style="font-family:var(--font-mono);font-size:13px;color:var(--muted);">{{ stepCounter }}</span>
    </div>
  </div>

  <div style="max-width:1080px;width:100%;text-align:left;margin-bottom:18px;">
    <h2 style="font-size:26px;line-height:1.4;font-weight:600;margin:0 0 12px;max-width:780px;">{{ caption }}</h2>
    <sc-if value="{{ hasCommand }}" hint-placeholder-val="{{ false }}">
      <div style="display:inline-block;font-family:var(--font-mono);font-size:15px;background:var(--chip-bg);color:var(--chip-text);padding:8px 16px;border-radius:8px;">
        <span style="opacity:0.5;">&gt;</span> {{ command }}
      </div>
    </sc-if>
  </div>

  <div style="position:relative;width:860px;max-width:100%;height:340px;">

    <div style="{{ usersHeaderStyle }}">users <span style="{{ pkTagStyle }}">PK: id</span></div>
    <sc-for list="{{ userRows }}" as="row" hint-placeholder-count="2">
      <div class="mm-box" style="{{ row.style }}">{{ row.text }}</div>
    </sc-for>

    <div style="{{ ordersHeaderStyle }}">orders <span style="{{ fkTagStyle }}">FK: user_id</span></div>
    <sc-for list="{{ orderRows }}" as="row" hint-placeholder-count="2">
      <div class="mm-box" style="{{ row.style }}">{{ row.text }}</div>
    </sc-for>

    <div style="{{ linkStyle }}"></div>

    <sc-if value="{{ attemptVisible }}" hint-placeholder-val="{{ false }}">
      <div class="mm-box" style="{{ attemptStyle }}">{{ attemptText }}</div>
    </sc-if>

  </div>

  <div style="max-width:1080px;width:100%;display:flex;align-items:center;justify-content:center;gap:20px;margin-top:20px;">
    <button class="git-nav-btn" onClick="{{ prevStep }}" disabled="{{ atStart }}" style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;background:var(--paper);border:2px solid var(--ink);border-radius:8px;padding:10px 20px;box-shadow:3px 3px 0 var(--ink);cursor:pointer;color:var(--ink);">&larr; Back</button>

    <div style="display:flex;gap:8px;">
      <sc-for list="{{ dots }}" as="dot" hint-placeholder-count="5">
        <div onClick="{{ dot.goTo }}" style="{{ dot.style }}"></div>
      </sc-for>
    </div>

    <button class="git-nav-btn" onClick="{{ nextStep }}" style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;background:var(--accent);border:2px solid var(--ink);border-radius:8px;padding:10px 20px;box-shadow:3px 3px 0 var(--ink);cursor:pointer;color:var(--accent-text);">{{ nextLabel }}</button>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { step: 0, theme: (typeof localStorage !== 'undefined' && localStorage.getItem('gitExplainerTheme')) || 'paper' };

  users = { x: 60, y: 60, w: 260, h: 44, rowGap: 8 };
  orders = { x: 540, y: 60, w: 260, h: 44, rowGap: 8 };

  steps = [
    { caption: "A PRIMARY KEY uniquely identifies each row in a table \u2014 no duplicates allowed, ever.", command: null, showFk: false, attempt: null, linkState: 'none' },
    { caption: "Try to insert a duplicate id and the database rejects it outright.", command: 'INSERT INTO users (id, name) VALUES (1, "Sam"); -- rejected', showFk: false, attempt: { zone: 'users', text: 'id=1, "Sam"' }, linkState: 'none' },
    { caption: "A FOREIGN KEY in another table points back to that primary key \u2014 it's how two tables stay linked.", command: null, showFk: true, attempt: null, linkState: 'valid' },
    { caption: "Insert an order for a user_id that doesn't exist, and the foreign key constraint blocks it too.", command: 'INSERT INTO orders (user_id, item) VALUES (99, "Book"); -- rejected', showFk: true, attempt: { zone: 'orders', text: 'user_id=99, "Book"' }, linkState: 'broken' },
    { caption: "That's referential integrity: the database won't let orders point to users who don't exist, keeping your data trustworthy.", command: null, showFk: true, attempt: null, linkState: 'valid' },
  ];

  themes = {
    paper: {
      bg: '0.975 0.01 85', dot: '0.23 0.02 75', dotA: 0.08, ink: '0.23 0.02 75', muted: '0.5 0.015 75',
      paper: '0.99 0.01 95', accent: '0.68 0.17 45', accentText: 'white', secondary: '0.6 0.13 250',
      chipBg: '0.23 0.02 75', chipText: '0.97 0.01 85', font: "'Space Grotesk', sans-serif",
      fontMono: "'IBM Plex Mono', monospace",
    },
    chalkboard: {
      bg: '0.27 0.03 250', dot: '0.96 0.01 90', dotA: 0.08, ink: '0.95 0.01 90', muted: '0.78 0.02 250',
      paper: '0.34 0.03 250', accent: '0.8 0.14 85', accentText: 'oklch(0.2 0.02 250)', secondary: '0.78 0.1 220',
      chipBg: '0.18 0.02 250', chipText: '0.9 0.05 85', font: "'Space Grotesk', sans-serif",
      fontMono: "'IBM Plex Mono', monospace",
    },
    terminal: {
      bg: '0.16 0.01 240', dot: '0.75 0.15 145', dotA: 0.12, ink: '0.88 0.03 145', muted: '0.55 0.1 145',
      paper: '0.21 0.01 240', accent: '0.72 0.17 145', accentText: 'oklch(0.1 0.02 240)', secondary: '0.72 0.15 195',
      chipBg: '0.1 0.01 240', chipText: '0.75 0.15 145', font: "'IBM Plex Mono', monospace",
      fontMono: "'IBM Plex Mono', monospace",
    },
    missingmanual: {
      bg: '0.99 0.002 260', dot: '0.99 0.002 260', dotA: 0, ink: '0.15 0.005 260', muted: '0.42 0.02 265',
      paper: '1 0 0', accent: '0.5 0.09 200', accentText: 'white', secondary: '0.5 0.09 200',
      chipBg: '0.15 0.005 260', chipText: '0.99 0.002 260',
      font: "'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
      fontMono: "'JetBrains Mono', 'SF Mono', Consolas, monospace",
    },
  };
  themeOptions = [
    { key: 'paper', label: 'Paper', swatch: 'oklch(0.94 0.02 85)' },
    { key: 'chalkboard', label: 'Chalkboard', swatch: 'oklch(0.3 0.03 250)' },
    { key: 'terminal', label: 'Terminal', swatch: 'oklch(0.18 0.02 240)' },
    { key: 'missingmanual', label: 'Missing Manual', swatch: 'oklch(0.5 0.09 200)' },
  ];

  col(vals, alpha) {
    return alpha != null ? `oklch(${vals} / ${alpha})` : `oklch(${vals})`;
  }

  get t() {
    return this.themes[this.state.theme] || this.themes.paper;
  }

  setTheme(key) {
    this.setState({ theme: key });
    try { localStorage.setItem('gitExplainerTheme', key); } catch (e) {}
  }

  renderVals() {
    const t = this.t;
    const step = this.steps[this.state.step];

    const usersHeaderStyle = `position:absolute;left:${this.users.x}px;top:${this.users.y - 32}px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:${this.col(t.ink)};display:flex;align-items:center;gap:8px;`;
    const ordersHeaderStyle = `position:absolute;left:${this.orders.x}px;top:${this.orders.y - 32}px;font-family:var(--font-mono);font-size:13px;font-weight:600;color:${this.col(t.ink)};display:flex;align-items:center;gap:8px;opacity:${step.showFk ? 1 : 0.3};transition:opacity 0.4s ease;`;
    const pkTagStyle = `font-size:10px;font-weight:700;color:${this.col(t.accent)};border:1.5px solid ${this.col(t.accent)};border-radius:5px;padding:2px 6px;`;
    const fkTagStyle = `font-size:10px;font-weight:700;color:${this.col(t.secondary)};border:1.5px solid ${this.col(t.secondary)};border-radius:5px;padding:2px 6px;`;

    const rowStyle = (y, w) => `position:absolute;left:${this.users.x}px;top:${y}px;width:${w}px;height:${this.users.h}px;display:flex;align-items:center;padding:0 16px;box-sizing:border-box;background:${this.col(t.paper)};border:2px solid ${this.col(t.ink)};border-radius:8px;font-family:var(--font-mono);font-size:13px;z-index:2;`;

    const userRows = [
      { y: this.users.y, text: 'id: 1, name: Ana' },
      { y: this.users.y + this.users.h + this.users.rowGap, text: 'id: 2, name: Ben' },
    ].map(r => ({ text: r.text, style: rowStyle(r.y, this.users.w) }));

    const orderRowStyle = (y) => `position:absolute;left:${this.orders.x}px;top:${y}px;width:${this.orders.w}px;height:${this.orders.h}px;display:flex;align-items:center;padding:0 16px;box-sizing:border-box;background:${this.col(t.paper)};border:2px solid ${this.col(t.ink)};border-radius:8px;font-family:var(--font-mono);font-size:13px;opacity:${step.showFk ? 1 : 0.3};transition:opacity 0.4s ease;z-index:2;`;
    const orderRows = [
      { y: this.orders.y, text: 'user_id: 1, item: Mug' },
      { y: this.orders.y + this.orders.h + this.orders.rowGap, text: 'user_id: 2, item: Bag' },
    ].map(r => ({ text: r.text, style: orderRowStyle(r.y) }));

    const linkColor = step.linkState === 'broken' ? this.col(t.accent) : (step.linkState === 'valid' ? this.col(t.secondary) : 'transparent');
    const x1 = this.users.x + this.users.w, y1 = this.users.y + this.users.h;
    const x2 = this.orders.x, y2 = this.orders.y + this.orders.h;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    const linkStyle = `position:absolute;left:${x1}px;top:${y1 - 1.5}px;width:${len}px;height:3px;background:${linkColor};border-style:${step.linkState === 'broken' ? 'dashed' : 'solid'};transform-origin:left center;transform:rotate(${angle}deg);transition:opacity 0.3s ease;opacity:${step.linkState === 'none' ? 0 : 1};z-index:1;`;

    const attempt = step.attempt;
    const attemptZoneX = attempt ? (attempt.zone === 'users' ? this.users.x : this.orders.x) : 0;
    const attemptZoneW = attempt ? (attempt.zone === 'users' ? this.users.w : this.orders.w) : 0;
    const attemptY = this.users.y + 2 * (this.users.h + this.users.rowGap) + 10;
    const attemptStyle = `position:absolute;left:${attemptZoneX}px;top:${attemptY}px;width:${attemptZoneW}px;padding:10px 16px;box-sizing:border-box;background:${this.col(t.paper)};border:2.5px dashed ${this.col(t.accent)};border-radius:8px;font-family:var(--font-mono);font-size:12px;color:${this.col(t.accent)};font-weight:600;transition:opacity 0.3s ease;opacity:${attempt ? 1 : 0};z-index:2;`;

    const dots = this.steps.map((s, i) => ({
      goTo: () => this.setState({ step: i }),
      style: `width:${i === this.state.step ? 22 : 10}px;height:10px;border-radius:6px;background:${i === this.state.step ? this.col(t.ink) : this.col(t.ink, 0.25)};cursor:pointer;transition:all 0.25s ease;`,
    }));

    const swatches = this.themeOptions.map(o => ({
      label: o.label,
      onClick: () => this.setTheme(o.key),
      style: `width:22px;height:22px;border-radius:50%;cursor:pointer;background:${o.swatch};border:2px solid ${o.key === this.state.theme ? this.col(t.ink) : 'rgba(120,110,95,0.35)'};box-shadow:${o.key === this.state.theme ? `0 0 0 2px ${this.col(t.bg)}, 0 0 0 4px ${this.col(t.ink)}` : 'none'};transition:all 0.2s ease;`,
    }));

    const themeVars = `--bg:${this.col(t.bg)};--dot:${this.col(t.dot, t.dotA)};--ink:${this.col(t.ink)};--muted:${this.col(t.muted)};--paper:${this.col(t.paper)};--accent:${this.col(t.accent)};--accent-text:${t.accentText};--chip-bg:${this.col(t.chipBg)};--chip-text:${this.col(t.chipText)};--font-heading:${t.font};--font-mono:${t.fontMono};`;

    return {
      themeVars, swatches, activeThemeKey: this.state.theme,
      stepLabel: `Keys – step ${this.state.step + 1}/${this.steps.length}`,
      stepCounter: `${this.state.step + 1} / ${this.steps.length}`,
      caption: step.caption,
      command: step.command,
      hasCommand: !!step.command,
      usersHeaderStyle, ordersHeaderStyle, pkTagStyle, fkTagStyle,
      userRows, orderRows, linkStyle,
      attemptVisible: !!attempt, attemptStyle, attemptText: attempt ? attempt.text : '',
      dots,
      atStart: this.state.step === 0,
      nextLabel: this.state.step === this.steps.length - 1 ? 'Restart ↺' : 'Next →',
      prevStep: () => this.setState(s => ({ step: Math.max(0, s.step - 1) })),
      nextStep: () => this.setState(s => ({ step: s.step === this.steps.length - 1 ? 0 : s.step + 1 })),
    };
  }
}

</script>
</body>
</html>
