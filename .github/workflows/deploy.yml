name: Deploy to production

# Runs whenever main updates (i.e. when a branch is merged into main).
on:
  push:
    branches: [main]
  workflow_dispatch: {}   # also lets you trigger a deploy manually from the Actions tab

# Don't let two deploys run at once.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH in and redeploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/themissingmanual
            git pull --ff-only
            docker compose --profile prod up -d --build
            docker image prune -f
